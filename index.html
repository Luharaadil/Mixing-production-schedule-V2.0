        const MachineCard = ({ machine, lang, shift, date, layoutRows, cycleTimes, currentTime, onOpenReport }) => {
          const t = (key) => TRANSLATIONS[lang][key] || key;
          const displayLots = machine.lots;
          const totalSet = machine.totalShiftSet || 0;
          const totalFin = machine.totalShiftFin || 0;
          const targetFin = machine.targetFin || 0;
          
          const planPercentage = totalSet > 0 ? Math.round((totalFin / totalSet) * 100) : 0;
          const cyclePercentage = machine.cycleAchievement || 0;

          const getStatusStyles = (status) => {
            switch (status) {
              case 'Running': return { bg: 'bg-green-500', text: 'text-white', border: 'border-green-600', icon: 'text-green-500' };
              case 'Setup Required': return { bg: 'bg-blue-500', text: 'text-white', border: 'border-blue-600', icon: 'text-blue-500' };
              case 'Maintenance': return { bg: 'bg-red-500', text: 'text-white', border: 'border-red-600', icon: 'text-red-500' };
              case 'Idle': return { bg: 'bg-yellow-500', text: 'text-white', border: 'border-yellow-600', icon: 'text-yellow-500' };
              case 'Complete': return { bg: 'bg-indigo-500', text: 'text-white', border: 'border-indigo-600', icon: 'text-indigo-500' };

                  <h3 className={`${headerFontSize} font-black text-white tracking-tight drop-shadow-lg`}>{machine.name}</h3>
                </div>
                <div className="absolute top-2 right-3 z-10">
                  <span className={`inline-flex items-center px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider shadow-lg border ${styles.bg} ${styles.text} ${styles.border}`}>
                    {t(machine.status.toLowerCase().replace(/\s+/g, '_'))}
                  </span>
                </div>
              </div>

              <div className="px-3 py-2 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex flex-col gap-2 shrink-0">
                <div className="space-y-1">
                  <div className="flex items-center justify-between text-[8px] md:text-[10px] font-bold uppercase tracking-tight">
                    <span className="text-slate-400">Shift Plan Progress</span>

                  </div>
                  <div className="relative w-full h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                    <div className={`absolute top-0 left-0 h-full transition-all duration-1000 ease-out ${planPercentage >= 100 ? 'bg-green-500' : 'bg-primary'}`} style={{ width: `${Math.min(planPercentage, 100)}%` }} />
                  </div>
                </div>

                <div className="space-y-1 group cursor-pointer" onClick={() => onOpenReport(machine.id)} title="Click to view detailed calculation report">

                    <span className={`${cyclePercentage < 90 ? 'text-red-500' : 'text-brand-orange'} font-black`}>{totalFin} / {targetFin} ({cyclePercentage}%)</span>
                  </div>
                  <div className="relative w-full h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                    <div className={`absolute top-0 left-0 h-full transition-all duration-1000 ease-out ${cyclePercentage >= 100 ? 'bg-green-500' : (cyclePercentage < 90 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-brand-orange')}`} style={{ width: `${Math.min(cyclePercentage, 100)}%` }} />
                  </div>
                </div>
              </div>

              <div className="flex-1 overflow-hidden">
                <table className="min-w-full divide-y divide-slate-100 dark:divide-slate-700 table-fixed">
                  <thead className="bg-slate-50 dark:bg-slate-800/80">
                    <tr>

                        <th key={col} className="px-1.5 py-1.5 text-left text-[8px] md:text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-tighter">{t(col)}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50 dark:divide-slate-700/50 bg-white dark:bg-slate-800">
                    {[0, 1, 2, 3].map((rowIdx) => {
                      const lot = displayLots[rowIdx];
                      if (!lot) return <tr key={`empty-${rowIdx}`} className="h-9 md:h-11"><td colSpan={columns.length} className="px-2"></td></tr>;
                      const isLotActive = lot.lotNo === machine.activeLotNo;
                      const isSetup = machine.status === 'Setup Required' && isLotActive;
                      const isRunning = machine.status === 'Running' && isLotActive;
                      return (
                        <tr key={rowIdx} className={`h-9 md:h-11 ${isRunning ? 'bg-green-50/70 dark:bg-green-900/10 border-l-4 border-green-500' : isSetup ? 'bg-blue-50/70 dark:bg-blue-900/10 border-l-4 border-blue-500' : ''} transition-colors`}>
                          <td className={`px-1.5 py-1 whitespace-nowrap ${tableFontSize} font-bold truncate`}>{lot.lotNo}</td>
                          <td className={`px-1.5 py-1 whitespace-nowrap ${tableFontSize} text-slate-500 dark:text-slate-400 truncate`}>{lot.spec}</td>
                          <td className={`px-1.5 py-1 whitespace-nowrap text-center ${tableFontSize} font-bold`}>{lot.set}</td>
                          <td className={`px-1.5 py-1 whitespace-nowrap text-center ${tableFontSize} font-black ${lot.fin >= lot.set ? 'text-blue-500' : 'text-green-500'}`}>{lot.fin}</td>
                          <td className={`px-1.5 py-1 whitespace-nowrap font-mono text-[8px] md:text-[10px] text-slate-400`}>{lot.start.split(' ').pop()}</td>
                          <td className={`px-1.5 py-1 whitespace-nowrap font-mono text-[8px] md:text-[10px] text-slate-400`}>{lot.end.split(' ').pop()}</td>

                        </tr>

                </table>

        const ReportModal = ({ machine, cycleTimes, currentTime, date, onClose }) => {
          const parseToSeconds = (timeStr) => {
            if (!timeStr || !timeStr.includes(':')) return null;
            const match = timeStr.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
            if (!match) return null;
            const h = parseInt(match[1]);
            const m = parseInt(match[2]);
            const s = parseInt(match[3] || "0");
            const d = new Date(date + 'T00:00:00');
            d.setHours(h, m, s, 0);
            return d.getTime() / 1000;
          };

          const fullLots = machine.allLots || machine.lots;
          const firstLotStart = fullLots.find(l => l.start && l.start.includes(':'))?.start;
          const firstStartSec = firstLotStart ? parseToSeconds(firstLotStart) : null;
          const nowSec = currentTime.getTime() / 1000;
          
          const totalElapsedSinceStart = firstStartSec ? nowSec - firstStartSec : 0;
          let accumulatedTheoreticalTime = 0;

          const lotBreakdown = fullLots.map((lot, i) => {
            const cycleTimeObj = cycleTimes.find(ct => {
              const lotSpec = lot.spec.toUpperCase().trim();
              const cycleSpec = ct.name.toUpperCase().trim();
              return lotSpec === cycleSpec || lotSpec.includes(cycleSpec) || cycleSpec.includes(lotSpec);
            });
            const ct = cycleTimeObj ? cycleTimeObj.time : 180;
            
            const startSec = parseToSeconds(lot.start);
            const endSec = parseToSeconds(lot.end) || nowSec;
            
            const stdDurationMin = (lot.fin * ct) / 60;
            const actualDurationMin = startSec && endSec ? (endSec - startSec) / 60 : 0;
            const diffMin = actualDurationMin - stdDurationMin;
            const lotEfficiency = actualDurationMin > 0 ? Math.round((stdDurationMin / actualDurationMin) * 100) : 0;
            
            let theoreticalInLot = 0;
            if (firstStartSec) {
              const remainingGlobalTime = totalElapsedSinceStart - accumulatedTheoreticalTime;
              if (remainingGlobalTime > 0) {
                const canFit = Math.floor(remainingGlobalTime / ct);
                theoreticalInLot = Math.min(canFit, lot.set);
                accumulatedTheoreticalTime += (theoreticalInLot * ct);
              }
            }

            return { lot, ct, theoreticalInLot, stdDurationMin, actualDurationMin, diffMin, lotEfficiency };
          });

          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm transition-all">
              <div className="bg-white dark:bg-slate-800 w-full max-w-5xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 dark:border-slate-700">
                <div className="px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="material-icons-round text-brand-orange">analytics</span>
                    <h2 className="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight">
                      Production Analysis: <span className="text-primary">{machine.name}</span>
                    </h2>
                  </div>
                  <button onClick={onClose} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors"><span className="material-icons-round">close</span></button>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar space-y-8">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div className="bg-slate-100/50 dark:bg-slate-900/30 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
                      <span className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Total Finished</span>
                      <span className="text-2xl font-black text-slate-800 dark:text-white">{machine.totalShiftFin}</span>
                    </div>
                    <div className="bg-slate-100/50 dark:bg-slate-900/30 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
                      <span className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Theoretical Target</span>
                      <span className="text-2xl font-black text-slate-800 dark:text-white">{machine.targetFin}</span>
                    </div>
                    <div className="bg-brand-orange/5 dark:bg-brand-orange/10 p-4 rounded-xl border border-brand-orange/20 text-center">
                      <span className="block text-[10px] font-bold text-brand-orange uppercase mb-1">Global Efficiency</span>
                      <span className={`text-2xl font-black ${machine.cycleAchievement && machine.cycleAchievement < 90 ? 'text-red-500' : 'text-brand-orange'}`}>{machine.cycleAchievement}%</span>
                    </div>
                    <div className="bg-slate-100/50 dark:bg-slate-900/30 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
                      <span className="block text-[10px] font-bold text-slate-400 uppercase mb-1">First Lot Start</span>
                      <span className="text-2xl font-black text-slate-800 dark:text-white">{firstLotStart || '--:--'}</span>
                    </div>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead className="sticky top-0 bg-white dark:bg-slate-800 shadow-sm z-10">
                        <tr className="text-[10px] font-black uppercase text-slate-500 border-b border-slate-200 dark:border-slate-700">
                          <th className="py-3 px-2">Lot No</th>
                          <th className="py-3 px-2">Spec</th>
                          <th className="py-3 px-2 text-center">Set</th>
                          <th className="py-3 px-2 text-center">Act</th>
                          <th className="py-3 px-2 text-center">Tar</th>
                          <th className="py-3 px-2 text-center">Std (m)</th>
                          <th className="py-3 px-2 text-center">Act (m)</th>
                          <th className="py-3 px-2 text-center">Loss (m)</th>
                          <th className="py-3 px-2 text-right">Efficiency</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                        {lotBreakdown.map((item, idx) => (
                          <tr key={idx} className={`text-xs hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors ${item.lotEfficiency < 90 ? 'bg-red-50/30 dark:bg-red-900/10' : ''}`}>
                            <td className="py-3 px-2 font-bold">{item.lot.lotNo}</td>
                            <td className="py-3 px-2 text-slate-500 dark:text-slate-400">{item.lot.spec}</td>
                            <td className="py-3 px-2 text-center font-medium">{item.lot.set}</td>
                            <td className="py-3 px-2 text-center font-black text-primary">{item.lot.fin}</td>
                            <td className="py-3 px-2 text-center font-bold text-slate-400">{item.theoreticalInLot}</td>
                            <td className="py-3 px-2 text-center font-mono">{item.stdDurationMin.toFixed(1)}</td>
                            <td className="py-3 px-2 text-center font-mono font-bold">{item.actualDurationMin.toFixed(1)}</td>
                            <td className={`py-3 px-2 text-center font-mono font-black ${item.diffMin > 5 ? 'text-red-500' : 'text-green-500'}`}>
                              {item.diffMin > 0 ? '+' : ''}{item.diffMin.toFixed(1)}
                            </td>
                            <td className={`py-3 px-2 text-right font-black ${item.lotEfficiency < 90 ? 'text-red-500' : 'text-green-500'}`}>
                              {item.lotEfficiency}%
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                     <h4 className="text-xs font-bold text-slate-500 uppercase mb-2 flex items-center gap-2"><span className="material-icons-round text-sm">info</span>Calculation Formulas</h4>
                     <ul className="text-[11px] text-slate-500 dark:text-slate-400 space-y-1">
                        <li>• <strong className="text-slate-700 dark:text-slate-300">Target Time Base:</strong> Theoretical Target now begins from the Actual Start Time of the first lot.</li>
                        <li>• <strong className="text-slate-700 dark:text-slate-300">Std (m):</strong> Calculated as (Standard Cycle Time × Actual Finished Quantity) for specific lot performance.</li>
                        <li>• <strong className="text-slate-700 dark:text-slate-300">Theoretical Target (Tar):</strong> How many batches could have been finished from the first start time until now, based on standard cycle times.</li>
                     </ul>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- APP COMPONENT ---

        const App = () => {
          const [machines, setMachines] = useState(INITIAL_MACHINES);
          const [cycleTimes, setCycleTimes] = useState(INITIAL_CYCLE_TIMES);
          const [category, setCategory] = useState('mixer');
          const [visibleIds, setVisibleIds] = useState(INITIAL_MACHINES.map(m => m.id));
          const [lang, setLang] = useState('en');
          const [theme, setTheme] = useState('light');
          const [isSidebarOpen, setSidebarOpen] = useState(true);
          const [shift, setShift] = useState('A');
          const pageSize = 3; 
          const [currentPage, setCurrentPage] = useState(1);
          const [productionDate, setProductionDate] = useState(new Date().toISOString().split('T')[0]);
          const [isConfigOpen, setConfigOpen] = useState(false);
          const [reportMachineId, setReportMachineId] = useState(null);
          const [currentTime, setCurrentTime] = useState(new Date());
          const [sheetUpdatedTime, setSheetUpdatedTime] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const [windowWidth, setWindowWidth] = useState(window.innerWidth);

          // Auto-refresh states
          const [refreshInterval, setRefreshInterval] = useState(120);
          const [timeRemaining, setTimeRemaining] = useState(120);

          // Touch states for swipe pagination
          const [touchStart, setTouchStart] = useState(null);
          const [touchEnd, setTouchEnd] = useState(null);
          const minSwipeDistance = 50;

          const [newMachineName, setNewMachineName] = useState('');
          const [newMachineCategory, setNewMachineCategory] = useState('mixer');
          const [newMachinePicture, setNewMachinePicture] = useState(undefined);
          
          const [newCycleName, setNewCycleName] = useState('');
          const [newCycleTime, setNewCycleTime] = useState('');
          const [newCycleMachineType, setNewCycleMachineType] = useState('Mixer');

          const fileInputRef = useRef(null);
          const dateInputRef = useRef(null);

          const isMobile = windowWidth < 768;

          const fetchCycleTimes = async () => {
            try {
              const response = await fetch('https://script.google.com/macros/s/AKfycbzsffVp8mTOI7NW5ctuiUWSwdSfTAPurjbCRFirNfmT3pnBka4JBe7mwGXN9D5DCHN5OA/exec');
              const data = await response.json();
              if (Array.isArray(data) && data.length > 1) {
                const newCycleTimes = data.slice(1).map((item, index) => ({
                  id: index + 1,
                  name: item[0],
                  time: Number(item[1]),
                  machineType: 'Mixer'
                }));
                setCycleTimes(newCycleTimes);
              }
            } catch (error) {
              console.error('Failed to fetch cycle times', error);
            }
          };

          useEffect(() => {
            fetchCycleTimes();
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            const handleResize = () => setWindowWidth(window.innerWidth);
            window.addEventListener('resize', handleResize);
            return () => {
              clearInterval(timer);
              window.removeEventListener('resize', handleResize);
            };
          }, []);

          // Auto-refresh countdown effect
          useEffect(() => {
            const countdownTimer = setInterval(() => {
              setTimeRemaining(prev => {
                if (prev <= 1) {
                  fetchSheetData();
                  return refreshInterval;
                }
                return prev - 1;
              });
            }, 1000);
            return () => clearInterval(countdownTimer);
          }, [refreshInterval]);

          useEffect(() => {
            fetchSheetData();
          }, [productionDate, shift]);

          useEffect(() => {
            setCurrentPage(1);
          }, [category, visibleIds, shift, productionDate]);

          useEffect(() => {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [theme]);

          const parseDateTimeToSeconds = (dateTimeStr) => {
            if (!dateTimeStr || dateTimeStr === '--:--' || dateTimeStr === 'START') return null;
            const timeMatch = dateTimeStr.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
            if (!timeMatch) return null;
            const hrs = parseInt(timeMatch[1]);
            const mins = parseInt(timeMatch[2]);
            const secs = parseInt(timeMatch[3] || "0");
            const d = new Date(productionDate + 'T00:00:00');
            d.setHours(hrs, mins, secs, 0);
            return d.getTime();
          };

          const calculateTheoreticalFin = (machineLots, machineId) => {
            if (machineLots.length === 0) return 0;
            const firstLotWithStartTime = machineLots.find(l => l.start && l.start.includes(':'));
            if (!firstLotWithStartTime) return 0;
            
            const firstStartTimestamp = parseDateTimeToSeconds(firstLotWithStartTime.start);
            if (!firstStartTimestamp) return 0;
            
            const nowTimestamp = currentTime.getTime();
            let remainingSeconds = (nowTimestamp - firstStartTimestamp) / 1000;
            if (remainingSeconds <= 0) return 0;
            
            let theoreticalCount = 0;
            for (let i = 0; i < machineLots.length; i++) {
              const lot = machineLots[i];
              let batchCycleSeconds = 180;
              
              if (machineId === 'CHE03' || machineId === 'CHE04') {
                const chemicalCycle = cycleTimes.find(ct => ct.name.toUpperCase() === 'CHEMICAL');
                batchCycleSeconds = chemicalCycle ? chemicalCycle.time : 180;
              } else {
                const cycleTimeObj = cycleTimes.find(ct => {
                  const lotSpec = lot.spec.toUpperCase().trim();
                  const cycleSpec = ct.name.toUpperCase().trim();
                  return lotSpec === cycleSpec || lotSpec.includes(cycleSpec) || cycleSpec.includes(lotSpec);
                });
                batchCycleSeconds = cycleTimeObj ? cycleTimeObj.time : 180;
              }
              
              const maxPossibleBatches = Math.floor(remainingSeconds / batchCycleSeconds);
              const batchesCanDo = Math.min(maxPossibleBatches, lot.set);
              
              theoreticalCount += batchesCanDo;
              remainingSeconds -= (batchesCanDo * batchCycleSeconds);
              
              if (remainingSeconds < batchCycleSeconds || batchesCanDo < lot.set) break;
              
              if (batchesCanDo === lot.set && i < machineLots.length - 1) {
                if (machineId === 'CHE03' || machineId === 'CHE04') {
                  remainingSeconds -= 150;
                }
              }
            }
            return theoreticalCount;
          };

          const fetchSheetData = async () => {
            setIsLoading(true);
            try {
              const response = await fetch(`${SHEET_URL}&cache_bust=${Date.now()}`);
              const csvText = await response.text();
              const rows = csvText.split('\n').map(row => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                  if (row[i] === '"') inQuotes = !inQuotes;
                  else if (row[i] === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                  } else current += row[i];
                }
                result.push(current.trim());
                return result;
              });

              if (rows.length > 0 && rows[0][0]) {
                const timestamp = rows[0][0].replace(/^"|"$/g, '').trim();
                setSheetUpdatedTime(timestamp);
              }

              const runningDataMap = {};
              rows.forEach(row => {
                const lotKey = row[3];
                if (lotKey && lotKey !== 'LOT NO') {
                  runningDataMap[lotKey] = {
                    fin: parseInt(row[5]) || 0,
                    start: row[8] || '--:--', // Column I (index 8)
                    end: row[9] || '--:--'    // Column J (index 9)
                  };
                }
              });

              const recvMap = {};
              rows.forEach(row => {
                if (row.length > 39) {
                  const batchNo = row[33]; 
                  const mixEndVal = row[39]; 
                  if (batchNo && mixEndVal) {
                    const mixEndNum = parseFloat(mixEndVal);
                    if (!isNaN(mixEndNum)) {
                      if (!(batchNo in recvMap) || mixEndNum > recvMap[batchNo]) {
                        recvMap[batchNo] = mixEndNum;
                      }
                    }
                  }
                }
              });

              const machineBatches = {};
              rows.slice(1).forEach(row => {
                if (row.length < 29) return; 
                const machineNo = row[14]; 
                const lotNo = row[16];     
                const spec = row[17];
                const setValue = parseInt(row[19]) || 0;
                const schedDate = row[28];
                const schedShiftVal = row[21];
                const rowShift = schedShiftVal === '1' ? 'A' : schedShiftVal === '3' ? 'B' : schedShiftVal === '5' ? 'C' : '';
                const isSameDate = schedDate.includes(productionDate) || productionDate.includes(schedDate);
                
                if (rowShift === shift && isSameDate) {
                  if (!machineBatches[machineNo]) machineBatches[machineNo] = [];
                  const actuals = runningDataMap[lotNo] || { fin: 0, start: '--:--', end: '--:--' };
                  
                  const targetMachine = machines.find(m => m.id === machineNo || m.name === machineNo);
                  const isDDPrep = targetMachine && targetMachine.type === 'preparation' && machineNo.startsWith('DD');
                  
                  const startTime = isDDPrep ? (row[11] || '--:--') : actuals.start;
                  const adjustedSet = Math.max(setValue, actuals.fin);
                  const recvVal = recvMap[lotNo] || 0;
                  
                  machineBatches[machineNo].push({ 
                    lotNo, 
                    spec, 
                    set: adjustedSet, 
                    fin: actuals.fin, 
                    recv: recvVal, 
                    start: startTime, 
                    end: actuals.end,
                    sequenceNumber: row[16] // Column Q
                  });
                }
              });

              const parseLotDate = (lot) => {
                if (!lot || lot.length < 6) return 0;
                const dd = lot.substring(0, 2);
                const mm = lot.substring(2, 4);
                const yy = lot.substring(4, 6);
                // Return YYYYMMDD as number for sorting
                return parseInt(`20${yy}${mm}${dd}`);
              };

              setMachines(prev => prev.map(m => {
                let allLotsForMachine = machineBatches[m.name] || machineBatches[m.id] || [];
                
                // MULTI-LEVEL SORTING
                allLotsForMachine.sort((a, b) => {
                  const dateA = parseLotDate(a.lotNo);
                  const dateB = parseLotDate(b.lotNo);
                  if (dateA !== dateB) return dateA - dateB; // Primary: Date ascending
                  // Secondary: sequenceNumber (Column Q) ascending
                  return (a.sequenceNumber || '').localeCompare(b.sequenceNumber || '', undefined, { numeric: true });
                });

                const totalShiftSet = allLotsForMachine.reduce((acc, lot) => acc + lot.set, 0);
                const totalShiftFin = allLotsForMachine.reduce((acc, lot) => acc + lot.fin, 0);

                let lastStartedIdx = -1;
                for (let i = allLotsForMachine.length - 1; i >= 0; i--) {
                  if (allLotsForMachine[i].fin > 0) {
                    lastStartedIdx = i;
                    break;
                  }
                }
                let newStatus = 'Idle';
                let activeLotNo = '';
                let displayPivotIdx = 0;
                if (allLotsForMachine.length > 0) {
                  if (lastStartedIdx === -1) {
                    newStatus = 'Setup Required';
                    activeLotNo = allLotsForMachine[0].lotNo;
                    displayPivotIdx = 0;
                  } else {
                    const currentLot = allLotsForMachine[lastStartedIdx];
                    if (currentLot.fin < currentLot.set) {
                      newStatus = 'Running';
                      activeLotNo = currentLot.lotNo;
                      displayPivotIdx = lastStartedIdx;
                    } else {
                      if (lastStartedIdx < allLotsForMachine.length - 1) {
                        newStatus = 'Setup Required';
                        activeLotNo = allLotsForMachine[lastStartedIdx + 1].lotNo;
                        displayPivotIdx = lastStartedIdx + 1;
                      } else {
                        newStatus = 'Complete';
                        activeLotNo = currentLot.lotNo;
                        displayPivotIdx = lastStartedIdx;
                      }
                    }
                  }
                }
                const startIdx = Math.max(0, displayPivotIdx - 1);
                const displayLots = allLotsForMachine.slice(startIdx, startIdx + 4);
                return {
                  ...m,
                  status: m.status === 'Maintenance' ? 'Maintenance' : newStatus,
                  activeLotNo,
                  lots: displayLots,
                  allLots: allLotsForMachine, 
                  totalShiftSet,
                  totalShiftFin
                };
              }));
              setTimeRemaining(refreshInterval);
            } catch (error) {
              console.error('Error fetching sheet data:', error);
            } finally {
              setIsLoading(false);
            }
          };

          const machinesWithEfficiency = useMemo(() => {
            return machines.map(m => {
              const fullLots = m.allLots || m.lots;
              const theoreticalTarget = calculateTheoreticalFin(fullLots, m.id);
              const actualFin = m.totalShiftFin || 0;
              const cycleAchievement = theoreticalTarget > 0 
                ? Math.round((actualFin / theoreticalTarget) * 100) 
                : (actualFin > 0 ? 100 : 0); 
              return {
                ...m,
                targetFin: theoreticalTarget,
                cycleAchievement: Math.min(cycleAchievement, 150)
              };
            });
          }, [machines, currentTime, cycleTimes, productionDate]);

          const filteredMachines = useMemo(() => {
            return machinesWithEfficiency.filter(m => m.type === category && visibleIds.includes(m.id));
          }, [machinesWithEfficiency, category, visibleIds]);

          const totalPages = Math.max(1, Math.ceil(filteredMachines.length / pageSize));

          const paginatedMachines = useMemo(() => {
            if (isMobile) return filteredMachines;
            const start = (currentPage - 1) * pageSize;
            return filteredMachines.slice(start, start + pageSize);
          }, [filteredMachines, currentPage, pageSize, isMobile]);

          const summary = useMemo(() => {
            const activeMachines = filteredMachines;
            let totalSet = 0;
            let totalFin = 0;
            let totalTarget = 0;
            activeMachines.forEach(m => {
              totalSet += m.totalShiftSet || 0;
              totalFin += m.totalShiftFin || 0;
              totalTarget += m.targetFin || 0;
            });
            const setAchievement = totalSet > 0 ? Math.round((totalFin / totalSet) * 100) : 0;
            const cycleAchievement = totalTarget > 0 ? Math.round((totalFin / totalTarget) * 100) : 0;
            return { totalSet, totalFin, setAchievement, cycleAchievement };
          }, [filteredMachines]);

          const reportMachine = useMemo(() => 
            machinesWithEfficiency.find(m => m.id === reportMachineId) || null
          , [reportMachineId, machinesWithEfficiency]);

          const t = (key) => TRANSLATIONS[lang][key] || key;

          const toggleSidebar = () => setSidebarOpen(!isSidebarOpen);

          const toggleMachineVisibility = (id) => {
            setVisibleIds(prev => prev.includes(id) ? prev.filter(v => v !== id) : [...prev, id]);
          };

          const handleSelectAllInDept = () => {
            const deptIds = machines.filter(m => m.type === category).map(m => m.id);
            setVisibleIds(prev => [...new Set([...prev, ...deptIds])]);
          };

          const handleSelectNoneInDept = () => {
            const deptIds = machines.filter(m => m.type === category).map(m => m.id);
            setVisibleIds(prev => prev.filter(id => !deptIds.includes(id)));
          };

          const updateMachineStatus = (id, status) => {
            setMachines(prev => prev.map(m => m.id === id ? { ...m, status } : m));
          };

          const handleAddMachine = (e) => {
            e.preventDefault();
            if (!newMachineName.trim()) return;
            const id = newMachineName.replace(/\s+/g, '-').toUpperCase();
            const newMachine = { id, name: newMachineName, status: 'Idle', type: newMachineCategory, icon: newMachineCategory === 'mixer' ? 'blender' : 'science', pictureUrl: newMachinePicture, lots: [] };
            setMachines(prev => [...prev, newMachine]);
            setVisibleIds(prev => [...prev, id]);
            setNewMachineName('');
            setNewMachinePicture(undefined);
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          const handleDeleteMachine = (id) => {
            setMachines(prev => prev.filter(m => m.id !== id));
            setVisibleIds(prev => prev.filter(vid => vid !== id));
          };

          const handleAddCycleTime = (e) => {
            e.preventDefault();
            if (!newCycleName.trim() || !newCycleTime) return;
            const newEntry = { id: Date.now(), name: newCycleName, time: parseInt(newCycleTime), machineType: newCycleMachineType };
            setCycleTimes(prev => [...prev, newEntry]);
            setNewCycleName('');
            setNewCycleTime('');
          };

          const handleDeleteCycleTime = (id) => setCycleTimes(prev => prev.filter(c => c.id !== id));

          const handleFileChange = (e) => {
            const file = e.target.files?.[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setNewMachinePicture(reader.result);
              reader.readAsDataURL(file);
            }
          };

          // Swipe handlers for mobile pagination
          const handleTouchStart = (e) => {
            setTouchEnd(null);
            setTouchStart(e.targetTouches[0].clientX);
          };

          const handleTouchMove = (e) => {
            setTouchEnd(e.targetTouches[0].clientX);
          };

          const handleTouchEnd = () => {
            if (!touchStart || !touchEnd) return;
            const distance = touchStart - touchEnd;
            const isLeftSwipe = distance > minSwipeDistance;

                                  <div className="flex items-center gap-5 overflow-hidden">
                                    {m.pictureUrl ? <div className="w-16 h-16 rounded-2xl bg-slate-200 overflow-hidden shrink-0 border border-slate-300 dark:border-slate-600 shadow-lg"><img src={m.pictureUrl} className="w-full h-full object-cover" /></div> : <div className={`w-4 h-4 rounded-full ${m.status === 'Running' ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.6)]' : 'bg-slate-300'} shrink-0`} />}
                                    <div className="truncate"><span className="font-black text-lg text-slate-800 dark:text-slate-100 tracking-tighter">{m.name}</span><p className="text-[9px] font-black uppercase tracking-widest text-slate-400">{m.type}</p></div>
                                  </div>
                                  <button onClick={() => handleDeleteMachine(m.id)} className="text-slate-300 hover:text-red-500 transition-colors p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/10" title="刪除機器"><span className="material-icons-round text-2xl">delete_outline</span></button>
                                </div>
                                <div className="relative">
                                  <input 
                                    list={`status-list-${m.id}`}
                                    value={m.status} 
                                    onChange={(e) => updateMachineStatus(m.id, e.target.value)} 
                                    className="text-xs font-black py-3.5 px-5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-4 focus:ring-primary/10 outline-none w-full pr-12 transition-all"
                                    placeholder="設置狀態..."
                                  />
                                  <datalist id={`status-list-${m.id}`}>
                                    <option value="Running" /><option value="Idle" /><option value="Maintenance" /><option value="Setup Required" /><option value="Complete" />
                                  </datalist>
                                  <span className="material-icons-round absolute right-4 top-3.5 text-slate-300 text-lg pointer-events-none">unfold_more</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="border-t border-slate-100 dark:border-slate-700 pt-16">
                        <h3 className="text-xs font-black uppercase tracking-[0.2em] text-slate-400 mb-8 flex items-center gap-3"><span className="material-icons-round text-primary">timer</span>生產規格</h3>
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-12">
                          <div className="lg:col-span-1">
                            <form onSubmit={handleAddCycleTime} className="bg-slate-50 dark:bg-slate-900/30 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-700 space-y-8">
                              <div><label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">規格標識</label><input type="text" value={newCycleName} onChange={(e) => setNewCycleName(e.target.value)} placeholder="例如：Tread 101" className="w-full text-sm font-bold rounded-2xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-4 focus:ring-primary/10 outline-none px-5 py-4 transition-all" required /></div>
                              <div><label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">標準時間 (秒)</label><input type="number" value={newCycleTime} onChange={(e) => setNewCycleTime(e.target.value)} placeholder="例如：180" className="w-full text-sm font-bold rounded-2xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-4 focus:ring-primary/10 outline-none px-5 py-4 transition-all" required /></div>
                              <div>
                                <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">機器類型</label>
                                <select value={newCycleMachineType} onChange={(e) => setNewCycleMachineType(e.target.value)} className="w-full text-sm font-bold rounded-2xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-4 focus:ring-primary/10 outline-none px-5 py-4 cursor-pointer transition-all">
                                  <option value="Mixer">密煉機</option><option value="Cutting">裁斷</option><option value="Chemical">化學</option>
                                </select>
                              </div>
                              <button type="submit" className="w-full bg-slate-900 dark:bg-slate-700 text-white font-black py-5 px-8 rounded-2xl hover:bg-black transition-all shadow-xl active:scale-95 uppercase tracking-widest text-[10px]">註冊規格</button>
                            </form>
                          </div>
                          <div className="lg:col-span-3">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-2xl">
                              <div className="max-h-[550px] overflow-y-auto custom-scrollbar">
                                <table className="min-w-full divide-y divide-slate-100 dark:divide-slate-700">
                                  <thead className="bg-slate-50 dark:bg-slate-900/50 sticky top-0 z-20">
                                    <tr>
                                      <th className="px-8 py-5 text-left text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">規格名稱</th>
                                      <th className="px-8 py-5 text-center text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">類別</th>
                                      <th className="px-8 py-5 text-center text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">持續時間</th>
                                      <th className="px-8 py-5 text-right text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">操作</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                    {cycleTimes.map(ct => (
                                      <tr key={ct.id} className="hover:bg-slate-50 dark:hover:bg-slate-900/20 transition-all duration-200">
                                        <td className="px-8 py-5 text-sm font-black text-slate-700 dark:text-slate-200 tracking-tight">{ct.name}</td>
                                        <td className="px-8 py-5 text-center">
                                          <span className={`inline-block px-4 py-1.5 rounded-full text-[9px] font-black uppercase border tracking-widest ${ct.machineType === 'Mixer' ? 'bg-blue-50 border-blue-200 text-blue-600' : ct.machineType === 'Cutting' ? 'bg-amber-50 border-amber-200 text-amber-600' : 'bg-purple-50 border-purple-200 text-purple-600'}`}>
                                            {ct.machineType}
                                          </span>
                                        </td>
                                        <td className="px-8 py-5 text-sm text-center font-mono text-primary font-black">{ct.time}s</td>
                                        <td className="px-8 py-5 text-right"><button onClick={() => handleDeleteCycleTime(ct.id)} className="text-slate-200 hover:text-red-500 transition-all p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/10"><span className="material-icons-round text-xl">delete_sweep</span></button></td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="p-8 border-t border-slate-100 dark:border-slate-700 flex justify-end bg-slate-50 dark:bg-slate-900/50">
                      <button onClick={() => setConfigOpen(false)} className="px-16 py-5 bg-primary hover:bg-primary-600 text-white font-black rounded-2xl shadow-2xl shadow-primary/20 hover:opacity-90 active:scale-95 transition-all uppercase tracking-[0.2em] text-[10px]">儲存並關閉</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
